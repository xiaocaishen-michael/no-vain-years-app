name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Use a fine-grained PAT instead of the default GITHUB_TOKEN so PRs
          # opened by release-please trigger the regular CI workflow. Default
          # GITHUB_TOKEN is gated by GitHub's anti-recursion protection (PRs
          # created via GITHUB_TOKEN do not start new workflow runs), which
          # leaves release-please PRs without required status checks and
          # blocks merge. Secret RELEASE_PLEASE_PAT is a fine-grained PAT
          # scoped to this repo with Contents + Pull requests + Issues
          # write permissions. Mirror of my-beloved-server config.
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # Auto-merge ONLY snapshot PRs (label autorelease: snapshot).
      # Release PRs (label autorelease: pending) stay manual — release timing
      # is the maintainer's call. See meta docs/conventions/git-workflow.md
      # § release-please PR special handling.
      - name: Auto-merge Snapshot PR (housekeeping only)
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          # GH_REPO env makes `gh` work without a git checkout (no .git here).
          echo "$PRS_JSON" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            labels=$(gh pr view "$number" --json labels --jq '[.labels[].name] | join(",")')
            if echo "$labels" | grep -q "autorelease: snapshot"; then
              gh pr merge --auto --squash --delete-branch "$number"
              echo "✅ Auto-merge enabled on Snapshot PR #${number}"
            else
              echo "⏸ PR #${number} (labels: $labels) — manual merge (Release PRs stay manual)"
            fi
          done
