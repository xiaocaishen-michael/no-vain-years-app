version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Day-1 majors flooded the queue (PR #7-#12). Pin major lines to
    # what we deliberately chose; Dependabot proposes patch/minor only.
    # Re-evaluate majors manually when:
    # - Node bumps a new LTS (Node 22 → 24 in late 2026)
    # - TypeScript hits 6.x stable + ecosystem catches up
    # - tooling bumps known to break (e.g. setup-node v6 dropped pnpm cache)
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: '@commitlint/cli'
        update-types: ['version-update:semver-major']
      - dependency-name: '@commitlint/config-conventional'
        update-types: ['version-update:semver-major']
      - dependency-name: 'lint-staged'
        update-types: ['version-update:semver-major']
      # Expo SDK majors require coordinated smoke-test (web + iOS + Android
      # + NativeWind compat). 5/2 PR #22 hit SDK 54 vs 55 mismatch;
      # PR #29 (expo 54→55) and PR #40 (expo group 11 包 SDK 54→55) both
      # closed pending dedicated upgrade session at M2 PKM start. The bare
      # 'expo' entry only matched the meta package — extend to the whole
      # SDK family (`expo-*` / `@expo/*`) plus `react-native` core +
      # ecosystem so the group PR cannot resurface.
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@expo/*'
        update-types: ['version-update:semver-major']
      # react-native core sits on 0.x.y — RN team treats every 0.x minor as
      # breaking and pairs it 1:1 with an Expo SDK line (SDK 54 ↔ RN 0.81.x).
      # PR #44 hit 0.81→0.85 with expo still 54, slipping past the
      # major-only ignore. Pin RN core to its current minor; bump it via
      # `expo install --fix` during the dedicated SDK upgrade session.
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-minor', 'version-update:semver-major']
      - dependency-name: 'react-native-*'
        update-types: ['version-update:semver-major']
      # react-native-screens 4.25.0 tightened its peer to
      # react-native >= 0.82.0 (i.e. Expo SDK 55+). PR #58 group-bumped it
      # past that line while we still ship SDK 54 / RN 0.81.x — restored
      # to 4.24.x. Block 4.25.0+ minor bumps until the SDK 55 session.
      - dependency-name: 'react-native-screens'
        versions: ['>=4.25.0']
      # Tailwind v4 incompatible with NativeWind v4 (per ADR-0014).
      # Pinned at ~3.4.x until NativeWind ships Tailwind v4 support.
      # NativeWind major bumps must coordinate with the Tailwind line.
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: 'nativewind'
        update-types: ['version-update:semver-major']
    # Reduce PR noise by grouping related dependencies into single PRs.
    groups:
      expo:
        patterns:
          - 'expo'
          - 'expo-*'
          - '@expo/*'
          - 'react-native'
          - 'react-native-*'
      nativewind:
        patterns:
          - 'nativewind'
          - 'tailwindcss'
      tanstack:
        patterns:
          - '@tanstack/*'
      lint-tools:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@typescript-eslint/*'
          - 'prettier'
          - 'lint-staged'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Same rationale as npm — actions/setup-node v6 dropped pnpm cache;
    # action-semantic-pull-request v6 is Node 24 + ESM. Manually evaluate.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      github-actions:
        patterns:
          - '*'
