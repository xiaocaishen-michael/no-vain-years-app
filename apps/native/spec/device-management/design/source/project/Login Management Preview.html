<script type="text/babel" data-presets="env,react">
// ─── tokens shim ─────────────────────────────────────────────────────────
const NVY_TOKENS = {
  color: {
    "brand-50":"#EEF3FE","brand-100":"#D5E0FC","brand-200":"#ABC1F9",
    "brand-300":"#7DA0F5","brand-400":"#4F7EEF","brand-500":"#2456E5",
    "brand-600":"#1D47C2","brand-700":"#173BA0","brand-soft":"#E8EEFD",
    "ink":"#1A1A1A","ink-muted":"#666666","ink-subtle":"#999999",
    "line":"#E5E7EB","line-strong":"#D1D5DB","line-soft":"#EEF0F3",
    "surface":"#FFFFFF","surface-alt":"#F9F9F9","surface-sunken":"#F2F4F7",
    "ok":"#10B981","ok-soft":"#E7F8F1",
    "err":"#EF4444","err-soft":"#FDECEC",
    "warn":"#F59E0B","warn-soft":"#FEF3DC",
    "accent":"#FF8C00","accent-soft":"#FFF1DE",
    "white":"#FFFFFF","transparent":"transparent",
    "modal-overlay":"rgba(15,18,28,0.48)",
  },
  space: { xs:4, sm:8, md:16, lg:24, xl:32, "2xl":48, "3xl":64 },
  num: { 0:0, 0.5:2, 1:4, 1.5:6, 2:8, 2.5:10, 3:12, 3.5:14, 4:16, 5:20, 6:24, 7:28, 8:32, 9:36, 10:40, 11:44, 12:48, 14:56, 16:64, 20:80, 24:96, 32:128 },
  fontSize: { "[10px]":10,"[11px]":11, xs:12, sm:14, base:16, lg:18, xl:20, "2xl":24, "3xl":30 },
  fontWeight: { normal:400, medium:500, semibold:600, bold:700 },
  shadow: {
    card: "0 1px 2px 0 rgba(17,24,39,.05), 0 1px 3px 0 rgba(17,24,39,.04)",
    cta:  "0 4px 12px -2px rgba(36,86,229,0.25)",
    "cta-err": "0 4px 12px -2px rgba(239,68,68,0.28)",
    sheet: "0 -4px 24px -6px rgba(17,24,39,0.18)",
  },
};

function nvyParseClasses(c) {
  if (!c) return {};
  const s = {}; for (const t of String(c).split(/\s+/).filter(Boolean)) applyToken(t, s);
  return s;
}
function applyToken(t, s) {
  let m;
  if (t === "flex-1") { s.flex = 1; return; }
  if (t === "flex-row") { s.display="flex"; s.flexDirection="row"; return; }
  if (t === "flex-col") { s.display="flex"; s.flexDirection="column"; return; }
  if (t === "flex-wrap") { s.flexWrap="wrap"; return; }
  if (t === "items-start") { s.alignItems="flex-start"; return; }
  if (t === "items-center") { s.alignItems="center"; return; }
  if (t === "items-end") { s.alignItems="flex-end"; return; }
  if (t === "justify-start") { s.justifyContent="flex-start"; return; }
  if (t === "justify-center") { s.justifyContent="center"; return; }
  if (t === "justify-between") { s.justifyContent="space-between"; return; }
  if (t === "justify-end") { s.justifyContent="flex-end"; return; }
  if (t === "self-center") { s.alignSelf="center"; return; }
  if (t === "relative") { s.position="relative"; return; }
  if (t === "absolute") { s.position="absolute"; return; }
  if (t === "overflow-hidden") { s.overflow="hidden"; return; }
  if (t === "leading-snug") { s.lineHeight=1.4; return; }
  if (t === "leading-relaxed") { s.lineHeight=1.6; return; }
  if (t === "tracking-tight") { s.letterSpacing="-0.015em"; return; }
  if (t === "tracking-wide") { s.letterSpacing="0.025em"; return; }
  if (t === "tracking-wider") { s.letterSpacing="0.05em"; return; }
  if (t === "text-center") { s.textAlign="center"; return; }
  if ((m = t.match(/^gap-(\S+)$/)))  { const v = sizeFor(m[1]); if (v != null) s.gap = v; return; }
  if ((m = t.match(/^p-(\S+)$/)))    { const v = sizeFor(m[1]); if (v != null) s.padding = v; return; }
  if ((m = t.match(/^px-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) { s.paddingLeft=v; s.paddingRight=v; } return; }
  if ((m = t.match(/^py-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) { s.paddingTop=v; s.paddingBottom=v; } return; }
  if ((m = t.match(/^pt-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.paddingTop = v; return; }
  if ((m = t.match(/^pb-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.paddingBottom = v; return; }
  if ((m = t.match(/^pl-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.paddingLeft = v; return; }
  if ((m = t.match(/^pr-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.paddingRight = v; return; }
  if ((m = t.match(/^m-(\S+)$/)))    { const v = sizeFor(m[1]); if (v != null) s.margin = v; return; }
  if ((m = t.match(/^mt-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.marginTop = v; return; }
  if ((m = t.match(/^mb-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.marginBottom = v; return; }
  if ((m = t.match(/^ml-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.marginLeft = v; return; }
  if ((m = t.match(/^mr-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.marginRight = v; return; }
  if ((m = t.match(/^w-(\S+)$/)))    { const v = wOrH(m[1]); if (v != null) s.width = v; return; }
  if ((m = t.match(/^h-(\S+)$/)))    { const v = wOrH(m[1]); if (v != null) s.height = v; return; }
  if ((m = t.match(/^max-w-(\S+)$/))){ const v = maxW(m[1]); if (v != null) s.maxWidth = v; return; }
  if (t === "h-px") { s.height = 1; return; }
  if (t === "w-px") { s.width = 1; return; }
  if ((m = t.match(/^top-(\S+)$/)))    { const v = sizeFor(m[1]); if (v != null) s.top = v; return; }
  if ((m = t.match(/^bottom-(\S+)$/))) { const v = sizeFor(m[1]); if (v != null) s.bottom = v; return; }
  if ((m = t.match(/^left-(\S+)$/)))   { const v = sizeFor(m[1]); if (v != null) s.left = v; return; }
  if ((m = t.match(/^right-(\S+)$/)))  { const v = sizeFor(m[1]); if (v != null) s.right = v; return; }
  if (t === "inset-0") { s.top=0; s.right=0; s.bottom=0; s.left=0; return; }
  if ((m = t.match(/^bg-(.+)$/)))    { const c = colorOrAlpha(m[1]); if (c) s.backgroundColor = c; return; }
  if ((m = t.match(/^text-(.+)$/)))  {
    if (NVY_TOKENS.fontSize[m[1]] != null) { s.fontSize = NVY_TOKENS.fontSize[m[1]]; return; }
    if (m[1] === "white") { s.color = "#fff"; return; }
    const c = colorOrAlpha(m[1]); if (c) s.color = c; return;
  }
  if ((m = t.match(/^font-(\S+)$/))) {
    if (m[1] === "sans") { s.fontFamily = 'Inter, "Noto Sans SC", -apple-system, sans-serif'; return; }
    if (m[1] === "mono") { s.fontFamily = '"JetBrains Mono", "SF Mono", Menlo, monospace'; return; }
    if (NVY_TOKENS.fontWeight[m[1]]) { s.fontWeight = NVY_TOKENS.fontWeight[m[1]]; return; }
    return;
  }
  if (t === "border")    { s.borderWidth=1; s.borderStyle="solid"; if (!s.borderColor) s.borderColor=NVY_TOKENS.color.line; return; }
  if (t === "border-b")  { s.borderBottomWidth=1; s.borderStyle="solid"; if (!s.borderColor) s.borderColor=NVY_TOKENS.color.line; return; }
  if (t === "border-t")  { s.borderTopWidth=1; s.borderStyle="solid"; if (!s.borderColor) s.borderColor=NVY_TOKENS.color.line; return; }
  if ((m = t.match(/^border-(.+)$/))) { const c = colorOrAlpha(m[1]); if (c) s.borderColor = c; return; }
  if (t === "rounded-full") { s.borderRadius=9999; return; }
  if (t === "rounded-xs")   { s.borderRadius=4; return; }
  if (t === "rounded-sm")   { s.borderRadius=8; return; }
  if (t === "rounded-md")   { s.borderRadius=12; return; }
  if (t === "rounded-lg")   { s.borderRadius=16; return; }
  if (t === "rounded-xl")   { s.borderRadius=12; return; }
  if (t === "rounded-2xl")  { s.borderRadius=16; return; }
  if ((m = t.match(/^rounded-\[(\d+)px\]$/))) { s.borderRadius = parseFloat(m[1]); return; }
  if (t === "shadow-sm" || t === "shadow-card") { s.boxShadow = NVY_TOKENS.shadow.card; return; }
  if (t === "shadow-cta")     { s.boxShadow = NVY_TOKENS.shadow.cta; return; }
  if (t === "shadow-cta-err") { s.boxShadow = NVY_TOKENS.shadow["cta-err"]; return; }
  if (t === "shadow-sheet")   { s.boxShadow = NVY_TOKENS.shadow.sheet; return; }
  if ((m = t.match(/^min-h-\[(\d+)px\]$/))) { s.minHeight = parseInt(m[1],10); return; }
  if ((m = t.match(/^opacity-(\d+)$/))) { s.opacity = parseInt(m[1],10) / 100; return; }
}
function sizeFor(t) {
  if (NVY_TOKENS.space[t] != null) return NVY_TOKENS.space[t];
  if (t in NVY_TOKENS.num) return NVY_TOKENS.num[t];
  const m = String(t).match(/^\[(\d+)px\]$/); if (m) return parseInt(m[1],10);
  return null;
}
function wOrH(t) { if (t==="full") return "100%"; if (t==="auto") return "auto"; return sizeFor(t); }
function maxW(t) {
  const map = { xs:320, sm:384, md:448, lg:512, xl:576, "2xl":672, "[280px]":280, "[360px]":360, "[760px]":760, "[860px]":860, "[1700px]":1700 };
  if (map[t] != null) return map[t];
  const m = t.match(/^\[(\d+)px\]$/); if (m) return parseInt(m[1],10);
  return null;
}
function colorOrAlpha(t) {
  const m = t.match(/^(.+)\/(\d+)$/);
  if (m) {
    const base = NVY_TOKENS.color[m[1]] || (m[1]==="white" ? "#FFFFFF" : null);
    if (!base) return null;
    return hexToRgba(base, parseInt(m[2],10)/100);
  }
  if (NVY_TOKENS.color[t]) return NVY_TOKENS.color[t];
  return null;
}
function hexToRgba(hex, a) {
  if (hex.startsWith("rgba")) return hex;
  const c = hex.replace("#",""); const v = c.length===3 ? c.split("").map(x=>x+x).join("") : c;
  return `rgba(${parseInt(v.slice(0,2),16)},${parseInt(v.slice(2,4),16)},${parseInt(v.slice(4,6),16)},${a})`;
}

// ─── RN shim ─────────────────────────────────────────────────────────────
const View = React.forwardRef(function View({ className, style, children, ...rest }, ref) {
  const s = { display:"flex", flexDirection:"column", boxSizing:"border-box", ...nvyParseClasses(className), ...(style||{}) };
  return <div ref={ref} style={s} {...rest}>{children}</div>;
});
const Text = React.forwardRef(function Text({ className, style, children, onPress, ...rest }, ref) {
  const s = { fontFamily:'Inter, "Noto Sans SC", -apple-system, sans-serif', color:"#1A1A1A", fontSize:14, margin:0, padding:0,
    ...nvyParseClasses(className), ...(style||{}) };
  return <span ref={ref} style={s} onClick={onPress} {...rest}>{children}</span>;
});
const Pressable = React.forwardRef(function Pressable({ className, style, children, onPress, disabled, hitSlop, accessibilityState, ...rest }, ref) {
  const s = { display:"flex", flexDirection:"column", boxSizing:"border-box",
    cursor: disabled ? "not-allowed" : "pointer", userSelect:"none",
    background:"transparent", border:0, padding:0, font:"inherit", color:"inherit", textAlign:"left",
    ...nvyParseClasses(className), ...(style||{}) };
  return <button ref={ref} type="button" style={s} onClick={disabled ? undefined : onPress} disabled={disabled} {...rest}>{children}</button>;
});
const ScrollView = React.forwardRef(function ScrollView({ className, style, contentContainerClassName, contentContainerStyle, children, ...rest }, ref) {
  const s = { display:"flex", flexDirection:"column", overflow:"auto", boxSizing:"border-box", ...nvyParseClasses(className), ...(style||{}) };
  const c = { display:"flex", flexDirection:"column", boxSizing:"border-box", ...nvyParseClasses(contentContainerClassName), ...(contentContainerStyle||{}) };
  return <div ref={ref} style={s} {...rest}><div style={c}>{children}</div></div>;
});
function ActivityIndicator({ size = "small", color = "#666666" }) {
  const dim = size === "small" ? 18 : 28;
  return (
    <div style={{
      width: dim, height: dim,
      border: `2px solid ${color}`, borderTopColor: "transparent",
      borderRadius: "50%", animation: "nvy-spin 0.9s linear infinite",
      boxSizing: "border-box",
    }}/>
  );
}

// ─── SVG shim ────────────────────────────────────────────────────────────
const Svg = ({ width, height, viewBox, children, ...rest }) =>
  <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox={viewBox} style={{display:"block"}} {...rest}>{children}</svg>;
const Path = (p) => <path {...p}/>;
const Rect = (p) => <rect {...p}/>;
const Circle = (p) => <circle {...p}/>;

// ─── IOSFrame ────────────────────────────────────────────────────────────
function IOSFrame({ width=360, height=780, children }) {
  return (
    <View className="bg-ink p-2 shadow-card" style={{ width: width+16, alignSelf:"flex-start", borderRadius: 44 }}>
      <View className="bg-surface overflow-hidden relative" style={{ width, height, borderRadius: 36 }}>
        <View className="flex-row items-center justify-between bg-surface" style={{ paddingLeft:28, paddingRight:28, paddingTop:12, paddingBottom:6, zIndex:2 }}>
          <Text className="text-xs font-semibold text-ink font-mono">9:41</Text>

            <Text className="text-[10px] text-ink">●●●●</Text>
            <Text className="text-[10px] text-ink">100%</Text>
          </View>
        </View>
        <View className="absolute rounded-full bg-ink" style={{ top:8, left:"50%", transform:"translateX(-50%)", width:96, height:28, zIndex:3 }}/>
        <View className="flex-1 relative" style={{minHeight:0, overflow:"hidden"}}>{children}</View>
        <View className="items-center bg-surface" style={{ paddingTop:4, paddingBottom:8 }}>
          <View className="rounded-full bg-ink" style={{ width:128, height:4 }}/>
        </View>
      </View>

  );
}

const stroke = (c, w=2) => ({ stroke:c, strokeWidth:w, fill:"none", strokeLinecap:"round", strokeLinejoin:"round" });
function IconBack({ color="#1A1A1A" }) {
  return <Svg width={22} height={22} viewBox="0 0 24 24"><Path d="M15 6 L9 12 L15 18" {...stroke(color,2)}/></Svg>;
}
function IconChevronRight({ color="#999999", size=18 }) {
  return <Svg width={size} height={size} viewBox="0 0 24 24"><Path d="M9 6 L15 12 L9 18" {...stroke(color,2)}/></Svg>;
}
function IconClose({ color="#666666" }) {
  return <Svg width={20} height={20} viewBox="0 0 24 24"><Path d="M6 6 L18 18 M18 6 L6 18" {...stroke(color,2)}/></Svg>;
}
function StackHeader({ title }) {

}

// ─── DeviceIcon (5 forms) ────────────────────────────────────────────────
function DeviceIcon({ kind, size=24, color="#666666" }) {
  const p = stroke(color, 1.75);
  if (kind === "PHONE") return (
    <Svg width={size} height={size} viewBox="0 0 24 24">
      <Rect x="7" y="2.5" width="10" height="19" rx="2" {...p}/>
      <Path d="M10 18.5 L14 18.5" {...p}/>
    </Svg>
  );
  if (kind === "TABLET") return (
    <Svg width={size} height={size} viewBox="0 0 24 24">
      <Rect x="3.5" y="3.5" width="17" height="17" rx="2" {...p}/>
      <Path d="M10 17.5 L14 17.5" {...p}/>
    </Svg>
  );
  if (kind === "DESKTOP") return (
    <Svg width={size} height={size} viewBox="0 0 24 24">
      <Rect x="2.5" y="4" width="19" height="12" rx="1.5" {...p}/>
      <Path d="M9 20.5 L15 20.5 M12 16.5 L12 20.5" {...p}/>
    </Svg>
  );
  if (kind === "WEB") return (
    <Svg width={size} height={size} viewBox="0 0 24 24">
      <Circle cx="12" cy="12" r="9" {...p}/>
      <Path d="M3 12 L21 12 M12 3 C15 6.5 15 17.5 12 21 M12 3 C9 6.5 9 17.5 12 21" {...p}/>
    </Svg>
  );
  // UNKNOWN
  return (
    <Svg width={size} height={size} viewBox="0 0 24 24">
      <Rect x="3.5" y="3.5" width="17" height="17" rx="3" {...p}/>
      <Circle cx="12" cy="12" r="1.25" fill={color} stroke={color}/>
    </Svg>
  );
}

// ─── Card primitive (list + detail share) ────────────────────────────────
function Card({ children }) {
  return (
    <View className="bg-surface rounded-md border border-line-soft overflow-hidden shadow-card">
      {children}
    </View>
  );
}

    return (
      <View className="flex-1 bg-surface-sunken">
        <View className="px-md pt-md pb-sm">
          <View className="bg-line-soft rounded-xs" style={{ width: 120, height: 12 }}/>
        </View>
        <View className="flex-1 items-center justify-center" style={{ gap: 8 }}>
          <ActivityIndicator/>
          <Text className="text-xs text-ink-subtle">加载中…</Text>
        </View>
      </View>
    );
  }
  let renderItems = [], total = 0, showCta = false;
  if (state === "list-3-with-current") { renderItems = FIXTURE_ITEMS.slice(0,3); total = 3; }
  else if (state === "list-paginated-10-of-12-with-cta") { renderItems = FIXTURE_ITEMS.slice(0,10); total = 12; showCta = true; }

  return (
    <View className="flex-1 bg-surface-sunken">
      <Subtitle count={total}/>
      <ScrollView className="flex-1" contentContainerClassName="px-md pb-xl gap-md">
        <Card>
          {renderItems.map((it,i) => (
            <React.Fragment key={it.id}>
              {i>0 ? <RowDivider/> : null}
              <DeviceRow item={it}/>
            </React.Fragment>
          ))}
        </Card>
        {showCta ? <MoreCta/> : null}
      </ScrollView>
    </View>
  );
}

// ═══ LoginManagementDetailScreen ═════════════════════════════════════════
function Field({ label, value, mono }) {
  return (
    <View className="px-md py-md gap-1">
      <Text className="text-xs text-ink-subtle">{label}</Text>
      <Text className={`text-base font-semibold text-ink ${mono ? "font-mono" : ""}`}>{value}</Text>
    </View>
  );
}

function RemoveButton() {
  return (
    <Pressable className="bg-err rounded-md items-center justify-center shadow-cta-err" style={{ height: 48 }}>
      <Text className="text-base font-semibold text-surface">移除该设备</Text>
    </Pressable>
  );
}

function LoginManagementDetailScreen({ detail }) {
  return (
    <View className="flex-1 bg-surface-sunken">
      <ScrollView className="flex-1" contentContainerClassName="px-md pt-md pb-xl gap-lg">
        <Card>
          <Field label="设备名称" value={detail.name}/>
          <RowDivider inset={16}/>
          <Field label="登录地点" value={detail.location ?? "—"}/>
          <RowDivider inset={16}/>
          <Field label="登录方式" value={LOGIN_METHOD_LABEL[detail.loginMethod]}/>
          <RowDivider inset={16}/>
          <Field label="最近活跃" value={detail.lastActiveAt} mono/>
        </Card>
        {!detail.isCurrent ? <RemoveButton/> : null}
      </ScrollView>
    </View>
  );
}

// ═══ RemoveDeviceSheet ═══════════════════════════════════════════════════
function ErrorRow({ message }) {
  return (
    <View className="bg-err-soft rounded-xs px-sm py-sm flex-row items-center gap-2">
      <View className="rounded-full bg-err items-center justify-center" style={{ width:16, height:16 }}>
        <Text className="text-[10px] font-bold text-surface">!</Text>
      </View>
      <Text className="text-xs text-err flex-1">{message}</Text>
    </View>
  );
}

function RemoveDeviceSheet({ state="default", errorMessage="网络错误，请重试" }) {
  const submitting = state === "submitting";
  return (
    <View className="absolute inset-0">
      <View className="flex-1 bg-modal-overlay justify-end">
        <View className="flex-1"/>
        <View className="bg-surface shadow-sheet"
              style={{ borderTopLeftRadius:16, borderTopRightRadius:16 }}>
          {/* drag handle */}
          <View className="items-center pt-sm">
            <View className="rounded-full bg-line-strong" style={{ width:40, height:4 }}/>
          </View>
          {/* header row */}
          <View className="px-lg pt-md pb-sm flex-row items-center">
            <View style={{ width:24 }}/>
            <View className="flex-1 items-center">
              <Text className="text-base font-semibold text-ink">移除设备</Text>
            </View>
            <Pressable className="items-center justify-center"
                       style={{ width:24, height:24, opacity: submitting ? 0.4 : 1 }}>
              <IconClose/>
            </Pressable>
          </View>
          {/* body */}
          <View className="px-lg pb-lg gap-md">
            {state === "error" ? <ErrorRow message={errorMessage}/> : null}
            <Text className="text-sm text-ink-muted text-center" style={{ lineHeight: 22 }}>
              移除设备后，该设备再次登录需要重新安全验证
            </Text>
            <View className="flex-row gap-sm" style={{ paddingTop: 4 }}>
              <Pressable className="flex-1 bg-surface border border-line-strong rounded-md items-center justify-center"
                         style={{ height:48, opacity: submitting ? 0.5 : 1 }}>
                <Text className="text-base font-medium text-ink">取消</Text>
              </Pressable>
              <Pressable className="flex-1 bg-err rounded-md items-center justify-center shadow-cta-err"
                         style={{ height:48 }}>
                {submitting ? (
                  <View className="flex-row items-center gap-2">
                    <ActivityIndicator size="small" color="#fff"/>
                    <Text className="text-base font-semibold text-surface">移除中…</Text>
                  </View>
                ) : (
                  <Text className="text-base font-semibold text-surface">移除</Text>
                )}
              </Pressable>
            </View>
            <View style={{ height: 8 }}/>
          </View>
        </View>
      </View>
    </View>
  );
}

// ═══ Page wrappers (with header for preview only) ════════════════════════
function ListPage({ state }) {
  return (
    <View className="flex-1 bg-surface">
      <StackHeader title="登录管理"/>
      <LoginManagementListScreen state={state}/>
    </View>
  );
}
function DetailPage({ detail, withSheet, sheetState }) {
  return (
    <View className="flex-1 bg-surface relative">
      <StackHeader title="登录设备详情"/>
      <LoginManagementDetailScreen detail={detail}/>
      {withSheet ? <RemoveDeviceSheet state={sheetState || "default"}/> : null}
    </View>
  );
}

// ═══ Frames + Preview ════════════════════════════════════════════════════
const FRAMES = [
  {
    num:"01", name:"LIST-LOADING", zh:"list 加载中",
    desc:"副标题骨架占位 + 居中 spinner。无 cta。首次进入页面 / refetch 时短暂出现。",
    pillBg:"bg-surface-sunken", pillFg:"text-ink-muted", dot:"bg-ink-muted",
    render: () => <ListPage state="list-loading"/>,
  },
  {
    num:"02", name:"LIST-3-CURRENT", zh:"3 设备 · 含本机",
    desc:"首屏典型: 3 行 active devices, 第 1 行 MK-iPhone 带 brand-soft 蓝灰「本机」徽标。items < 10 不显 cta。",
    pillBg:"bg-brand-soft", pillFg:"text-brand-600", dot:"bg-brand-500",
    render: () => <ListPage state="list-3-with-current"/>,
  },
  {
    num:"03", name:"LIST-PAGINATED-CTA", zh:"10/12 + 更多",
    desc:"前 10 条 + 末尾 inline 「更多设备 >」 cta。tap 后追加 page+1, items >= total 时 cta 消失。",
    pillBg:"bg-accent-soft", pillFg:"text-accent", dot:"bg-accent",
    render: () => <ListPage state="list-paginated-10-of-12-with-cta"/>,
  },
  {
    num:"04", name:"DETAIL-CURRENT", zh:"本机详情 · 无移除",
    desc:"本机条目: 4 字段 (设备名称 / 登录地点 / 登录方式 / 最近活跃 [秒精度])。移除按钮**不渲染**, 留白。",
    pillBg:"bg-brand-soft", pillFg:"text-brand-600", dot:"bg-brand-500",
    render: () => <DetailPage detail={FIXTURE_CURRENT}/>,
  },
  {
    num:"05", name:"DETAIL-OTHER", zh:"他机详情 · 可移除",
    desc:"4 字段 + 全宽 destructive「移除该设备」(err fill + shadow-cta-err)。tap → 弹起 RemoveDeviceSheet。",
    pillBg:"bg-err-soft", pillFg:"text-err", dot:"bg-err",
    render: () => <DetailPage detail={FIXTURE_OTHER}/>,
  },
  {
    num:"06", name:"SHEET-ACTIVE", zh:"移除确认 sheet",
    desc:"detail-other 之上叠 RemoveDeviceSheet。modal-overlay scrim + rounded-t-lg card + 顶部 handle + ✕ + 双 button (取消 outline / 移除 err fill)。",
    pillBg:"bg-ink/10", pillFg:"text-ink", dot:"bg-ink",
    render: () => <DetailPage detail={FIXTURE_OTHER} withSheet sheetState="default"/>,
  },
];

function StateFrame({ spec }) {
  return (
    <View className="gap-3" data-screen-label={`${spec.num} ${spec.name}`}>
      <IOSFrame>{spec.render()}</IOSFrame>
      <View className="gap-1 max-w-[360px]">
        <View className="flex-row items-center gap-2 flex-wrap">
          <View className={`flex-row items-center gap-1.5 rounded-full ${spec.pillBg}`} style={{paddingLeft:8,paddingRight:8,paddingTop:2,paddingBottom:2}}>
            <View className={`rounded-full ${spec.dot}`} style={{width:6,height:6}}/>
            <Text className={`text-[10px] font-semibold tracking-wider ${spec.pillFg}`}>{spec.name}</Text>
          </View>
          <Text className="text-[11px] font-medium text-ink-subtle">{spec.num}</Text>
          <Text className="text-sm font-semibold text-ink">· {spec.zh}</Text>
        </View>
        <Text className="text-xs text-ink-muted leading-snug">{spec.desc}</Text>
      </View>
    </View>
  );
}

function App() {
  return (
    <ScrollView className="flex-1 bg-surface-sunken">
      <View className="items-center" style={{paddingLeft:32,paddingRight:32,paddingTop:40,paddingBottom:40,gap:32}}>
        <View className="flex-row flex-wrap justify-between items-end gap-6 w-full max-w-[1700px]">
          <View className="gap-1.5">
            <Text className="text-2xl font-bold text-ink tracking-tight">
              登录管理 · device-management{"  "}
              <Text className="text-lg font-medium text-ink-muted">· account-center</Text>
            </Text>
            <Text className="text-sm text-ink-muted leading-relaxed max-w-[760px]">
              从「设置 → 账号与安全 → 登录管理」push 进入的 3-page 流: list 页 / 详情 / 移除确认 sheet。
              复用 delete-cancel PHASE 2 token base, +0 新色板; 「本机」徽标走 brand-soft (identity 语义),
              destructive 移除按钮走 err fill, sheet overlay 直接复用 modal-overlay。
            </Text>
          </View>
          <View className="flex-row gap-4">
            <Text className="text-[11px] text-ink-subtle">
              <Text className="text-ink-muted font-medium">Frame</Text>{"  "}iPhone · 360×780
            </Text>
            <Text className="text-[11px] text-ink-subtle">
              <Text className="text-ink-muted font-medium">States</Text>{"  "}6 (list ×3 / detail ×2 / sheet ×1)
            </Text>
          </View>
        </View>

        <View className="flex-row flex-wrap justify-center" style={{gap:28}}>
          {FRAMES.map(s => <StateFrame key={s.num} spec={s}/>)}
        </View>

        {/* Token diff annotation */}
        <View className="mt-2 max-w-[860px] gap-2">
          <Text className="text-xs font-semibold text-ink">Token diff vs delete-cancel PHASE 2 base</Text>
          <Text className="text-[11px] text-ink-muted leading-relaxed">
            <Text className="font-mono text-ink">+0 新 color / spacing / radius / font</Text>{"   ·   "}
            <Text className="font-mono text-ink">+2 shadow</Text> (cta-err 红色 CTA halo / sheet 底部 lift) — 局部视觉 polish, 非语义 token
          </Text>
          <Text className="text-[11px] text-ink-muted leading-relaxed">
            「本机」徽标 → <Text className="font-mono text-ink">brand-soft + brand-600</Text> · 拒绝 err-soft 红 (与 destructive 移除语义混淆) · 拒绝 accent 橙 (太抢戏盖过其他条目)
          </Text>
          <Text className="text-[11px] text-ink-muted leading-relaxed">
            destructive 移除 → <Text className="font-mono text-ink">err</Text> fill (mirror delete-cancel 「确认注销」){"   ·   "}
            sheet overlay → <Text className="font-mono text-ink">modal-overlay</Text> (复用){"   ·   "}

        </View>

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
